name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # wrangler.jsonc ships with database_id REPLACE_ME so the repo isn't tied
      # to one account — look the id up by name here (creating the db on first run)
      - name: resolve D1 database id
        run: |
          if grep -q REPLACE_ME wrangler.jsonc; then
            ID=$(npx wrangler d1 list --json | jq -r '.[] | select(.name == "vanlife") | .uuid')
            if [ -z "$ID" ]; then
              echo "creating D1 database 'vanlife'…"
              npx wrangler d1 create vanlife
              ID=$(npx wrangler d1 list --json | jq -r '.[] | select(.name == "vanlife") | .uuid')
            fi
            [ -n "$ID" ] || { echo "could not resolve a D1 database id"; exit 1; }
            sed -i "s/REPLACE_ME/$ID/" wrangler.jsonc
            echo "using database_id $ID"
          fi

      - name: apply schema
        run: npx wrangler d1 execute vanlife --remote --file=schema.sql -y

      - name: deploy worker
        run: npx wrangler deploy

      # optional: add an INGEST_TOKEN repo secret and CI keeps the worker's
      # ingest token in sync — otherwise set it once with `wrangler secret put`
      - name: sync ingest token
        env:
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
        run: |
          if [ -n "$INGEST_TOKEN" ]; then
            echo "$INGEST_TOKEN" | npx wrangler secret put INGEST_TOKEN
          else
            echo "no INGEST_TOKEN repo secret set, skipping"
          fi
