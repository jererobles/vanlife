<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>🚐 our little adventure</title>
  <meta name="description" content="a cozy live map of our van life adventure">
  <meta name="theme-color" content="#fffaf4" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#262031" media="(prefers-color-scheme: dark)">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚐</text></svg>">
  <!-- fonts + leaflet are vendored so the map loads fast even on shaky van wifi -->
  <link rel="stylesheet" href="vendor/fonts.css">
  <link rel="stylesheet" href="vendor/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map" aria-label="adventure map"></div>

  <header class="card" id="title-card">
    <h1 id="trip-name" data-i18n="loading">loading…</h1>
    <div id="stats" class="stats"></div>
  </header>

  <aside class="card" id="now-card" hidden>
    <div class="now-top">
      <span id="now-emoji" class="now-emoji">✨</span>
      <div>
        <div id="now-temp" class="now-temp"></div>
        <div id="now-desc" class="now-desc"></div>
      </div>
    </div>
    <div id="now-chips" class="chips"></div>
    <div id="now-updated" class="updated"></div>
  </aside>

  <div class="card" id="empty-card" hidden>
    <p class="empty-emoji">🌱🚐</p>
    <p data-i18n-html="empty">no adventures logged yet…<br>the map will bloom once the van starts sending its location 💌</p>
  </div>

  <footer id="credit" data-i18n="credit">made with 💕 on the road</footer>

  <button class="float-btn" id="pile-btn" hidden>🥾 shoebox</button>
  <button class="float-btn" id="van-btn" data-i18n-title="vanBtn" title="jump to the van" aria-label="jump to the van">🚐</button>
  <button class="float-btn" id="recenter-btn" data-i18n-title="recenter" title="show the whole route" aria-label="show the whole route">🧭</button>

  <div class="overlay" id="gallery" hidden>
    <div class="card gallery-card">
      <div class="gallery-head">
        <h2 id="gallery-title" data-i18n="shoeboxTitle">📸 the shoebox</h2>
        <p id="gallery-sub" data-i18n="shoeboxSub">album photos still waiting for their place on the route</p>
        <button class="close-btn" id="gallery-close" aria-label="close">✕</button>
      </div>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>
  </div>

  <div class="overlay" id="lightbox" hidden>
    <div>
      <img alt="">
      <p class="cap"></p>
    </div>
  </div>

  <script src="vendor/leaflet.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
